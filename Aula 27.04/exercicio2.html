<script>
// 2. Faça um script que pede duas notas de um aluno.
// Em seguida ele deve calcular a média do aluno e dar o seguinte resultado: 
// A mensagem "Aprovado", se a média alcançada for maior ou igual a sete.

const nota1 = parseFloat(prompt("Digite o valor da primeira nota:"));
const nota2 = parseFloat(prompt("Digite o valor da segunda nota:"));
const media = (nota1 + nota2) / 2;

if (media >= 7) {
    alert("Aprovado");
} else {
    alert("Reprovado");
}
</script>
