<script>
//02. Você está no Brasil, e para temperatura usamos o grau Celsius.
//Porém, quando você for contrato para trabalhar como programador Python ou javaScript no exterior, deverá usar graus Fahrenheit.


//Entrada
let c = parseFloat(prompt("Digite a temperatura em Celsius:"));
//Processamento
let fahr = (c * 9 / 5) + 32;
//Saída
document.write("A temperatua em Fahrenheit é: " +fahr);
</script>
