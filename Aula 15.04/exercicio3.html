<script>

//03. Agora faça o contrário. Você fornece a temperatura em graus Fahrenheit
//seu programa deve converter para Celsius e exibir na tela a temperatura em graus Celsius.
//Solução dos exercícios 02 e 03: Conversão entre graus Celsius e Fahrenheit em JavaScript

//Entrada
let fahr = parseFloat(prompt("Digite a temperatura em Fahrenheit:"));
//Processamento
let c = (fahr - 32) / 1.8;
//Saída
document.write("A temperatura em Celsius é: "+ c);

</script>
