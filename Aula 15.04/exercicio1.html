<script>

// 01. Escreva um programa que pede o raio de um círculo, e em seguida exiba o perímetro e área do círculo.
// Entrada    
let r = parseInt(prompt("Digite o raio do círculo:"));
// Processamento
let area = 3.14 * (r ** 2);
// Saída
document.write("O perímetro da área é: " +area);

</script>
