<script>
    //entrada
    let n1= 5;
    let n2= 2;

    //processamento
    let soma= n1 + n2;
    let sub= n1 - n2;
    let mult= n1 * n2;
    let potencia= n1 ** n2;

    //saída
    document.write("O resultado da soma foi: " +soma+" <br/>");
    
    document.write("O resultado da subtração foi: " +sub+" <br/>");
    
    document.write("O resultado da multiplicaão foi: " +mult+" <br/>");
    
    document.write("O resultado da potencia foi: " +potencia+" <br/>");


</script>
